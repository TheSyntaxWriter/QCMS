{% extends 'admin_panel/admin_base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'admin_panel/checklist_builder.css' %}" />

<div class="panel-header">
  <h2>{% if builder_mode == 'edit' %}Edit Checklist{% else %}Create Checklist{% endif %}</h2>
  <a class="btn btn-view" href="{% url 'admin_checklists' %}">← Back to Checklists</a>
</div>

<form id="checklistForm">
  {% csrf_token %}
  <input type="hidden" name="action" value="{% if builder_mode == 'edit' %}edit{% else %}create{% endif %}" />
  <input type="hidden" name="checklist_pk" value="{% if builder_item %}{{ builder_item.id }}{% endif %}" />
  <input type="hidden" id="builderStateJson" name="builder_state_json" />

  <div class="card-lite builder-shell">
    <div class="builder-topbar">
      <input id="checklistNameInput" name="name" type="text" placeholder="Untitled checklist" value="{{ builder_item.name|default:'' }}" required />
      <div class="builder-actions">
        <button id="addSectionBtn" type="button" class="btn btn-add">+ Add Section</button>
        <button id="togglePreviewBtn" type="button" class="btn btn-view">Preview Mode</button>
      </div>
    </div>
    <div id="builderRoot" class="builder-root"></div>
    <div class="builder-footer"><button class="btn btn-add" type="submit">Save Checklist</button></div>
  </div>
</form>

{{ initial_builder_state|json_script:'builder-initial-state' }}
<script>
window.checklistBuilderConfig = { actionUrl: "{% url 'admin_checklist_action' %}", csrfToken: "{{ csrf_token }}" };
</script>
<script src="{% static 'admin_panel/checklist_builder.js' %}"></script>
{% endblock %}
