{% load static %}
<div class="sidebar">
  <h2>
    <img src="{% static 'images/logo.png' %}" alt="WMS Logo" style="width:40px;height:40px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px;">
    {{ panel_title|default:'WMS' }}
  </h2>
  <div class="sidebar-menu">
    <div class="sidebar-menu-main">
      {% for item in menu_items %}
      <a href="{{ item.url }}" class="{% if request.path == item.url %}active{% endif %}">{{ item.label }}</a>
      {% endfor %}
    </div>

    <div class="sidebar-menu-footer">
      <hr />
      <a href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
</div>
