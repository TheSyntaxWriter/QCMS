{% load static %}
<div class="app-sidebar" id="appSidebar">
  <div class="app-sidebar__header">
    <a href="{% if menu_items and menu_items.0 %}{{ menu_items.0.url }}{% else %}#{% endif %}" class="app-sidebar__brand" aria-label="{{ PROJECT_SHORT_NAME }} home">
      <img class="app-sidebar__brand-logo" src="{% if GLOBAL_BRANDING.sidebar_logo %}{{ GLOBAL_BRANDING.sidebar_logo.url }}{% elif GLOBAL_BRANDING.logo %}{{ GLOBAL_BRANDING.logo.url }}{% else %}{% static 'images/logo.png' %}{% endif %}" alt="{{ PROJECT_SHORT_NAME }} logo">
      <span class="app-sidebar__brand-text">{{ panel_title|default:PROJECT_SHORT_NAME }}</span>
    </a>
    <button class="app-sidebar__toggle" id="sidebarToggle" type="button" aria-label="Toggle sidebar" aria-expanded="true">
      <span class="app-icon app-icon--chevron" aria-hidden="true"></span>
    </button>
  </div>

  <div class="app-sidebar__menu">
    <div class="app-sidebar__menu-main">
      {% for item in menu_items %}
        <a href="{{ item.url }}" class="app-sidebar__link {% if request.path == item.url %}is-active{% endif %}" {% if item.title %}title="{{ item.title }}"{% endif %}>
          <span class="app-icon app-icon--{{ item.icon|default:'dashboard' }}" aria-hidden="true"></span>
          <span class="app-sidebar__label">{{ item.label }}</span>
        </a>
      {% endfor %}
    </div>

    <div class="app-sidebar__menu-footer">
      <a href="{% url 'logout' %}" class="app-sidebar__link app-sidebar__link--logout" title="Logout">
        <span class="app-icon app-icon--logout" aria-hidden="true"></span>
        <span class="app-sidebar__label">Logout</span>
      </a>
    </div>
  </div>
</div>
