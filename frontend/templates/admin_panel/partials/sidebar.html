<div class="sidebar">
  <h2>{{ panel_title|default:'WMS' }}</h2>
  <div class="sidebar-menu">
    <div class="sidebar-menu-main">
      {% for item in menu_items %}
      <a href="{{ item.url }}" class="{% if request.path == item.url %}active{% endif %}">{{ item.label }}</a>
      {% endfor %}
    </div>

    <div class="sidebar-menu-footer">
      <hr />
      <a href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
</div>
