<!doctype html>
<html>
  <head>
    <title>Admin Panel</title>

    <!-- FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- ICON -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      /* ================= GLOBAL ================= */
      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        background: #f1f3f9;
      }

      /* ================= SIDEBAR ================= */
      .sidebar {
        width: 200px;
        background: #080870;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        padding: 20px;
        color: white;
      }

      .sidebar h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      /* 🔥 MENU */
      .sidebar a {
        display: flex;
        align-items: center;
        padding: 12px;
        margin-bottom: 10px;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: 0.3s;
      }

      /* 🔥 ACTIVE FIX (NO HARDCODE) */
      .sidebar a.active {
        background: white;
        color: #080870;
      }

      .sidebar a:hover {
        background: white;
        color: #080870;
      }

      .sidebar i {
        margin-right: 10px;
      }

      /* ================= CONTENT ================= */
      .content {
        margin-left: 240px; /* 🔥 FIX OVERLAP */
        padding: 20px;
      }

      /* ================= TOPBAR ================= */
      .topbar {
        background: #080870;
        color: white;
        padding: 12px 20px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      /* ================= TABLE ================= */
      .table-container {
        overflow-x: auto; /* 🔥 HORIZONTAL SCROLL */
      }

      table {
        width: 100%;
        min-width: 1000px; /* 🔥 important */
        border-collapse: collapse;
      }

      thead th {
        background: #080870;
        color: white;
        padding: 10px;
        font-size: 13px; /* 🔥 reduced */
        text-align: left;
      }

      tbody td {
        padding: 10px;
        font-size: 12px; /* 🔥 reduced */
      }

      tr {
        border-bottom: 1px solid #eee;
      }

      tr:hover {
        background: #eef2ff;
      }

      /* ================= BUTTONS ================= */
      .btn {
        padding: 5px 10px;
        font-size: 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin: 2px;
        display: inline-block;
      }

      .btn-view {
        background: #10087b;
        color: white;
      }
      .btn-edit {
        background: #058405;
        color: white;
      }
      .btn-delete {
        background: #8d0808;
        color: white;
      }
      .btn-add {
        background: #10087b;
        color: white;
      }
      /* ================= STATUS ================= */
      .active-text {
        color: green;
      }
      .inactive-text {
        color: red;
      }
    </style>
  </head>

  <body>
    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar">
      <h2>WMS</h2>

      <!-- 🔥 DYNAMIC ACTIVE FIX -->
      <a
        href="/admin-dashboard/"
        class="{% if request.path == '/admin-dashboard/' %}active{% endif %}"
      >
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </a>

      <a
        href="/admin-panel/users/"
        class="{% if request.path == '/admin-panel/users/' %}active{% endif %}"
      >
        <i class="fa-solid fa-user"></i> Users
      </a>

      <a
        href="/admin-panel/departments/"
        class="{% if request.path == '/admin-panel/departments/' %}active{% endif %}"
      >
        <i class="fa-solid fa-building"></i> Departments
      </a>

      <a
        href="/admin-panel/projects/"
        class="{% if request.path == '/admin-panel/projects/' %}active{% endif %}"
      >
        <i class="fa-solid fa-folder"></i> Projects
      </a>

      <a
        href="/admin-panel/checklists/"
        class="{% if request.path == '/admin-panel/checklists/' %}active{% endif %}"
      >
        <i class="fa-solid fa-list-check"></i> Checklists
      </a>

      <a
        href="/admin-panel/responses/"
        class="{% if request.path == '/admin-panel/responses/' %}active{% endif %}"
      >
        <i class="fa-solid fa-file-lines"></i> Responses
      </a>

      <hr />

      <a href="/logout/">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </a>
    </div>

    <!-- ================= CONTENT ================= -->
    <div class="content">
      <div class="topbar">
        <div>Admin Dashboard</div>
        <div>Welcome, Admin</div>
      </div>

      {% block content %}{% endblock %} {% block extra_js %}{% endblock %}
    </div>
  </body>
</html>
