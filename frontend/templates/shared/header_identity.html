{% load static %}
{% with profile=request.user.userprofile %}
<a
  class="topbar-identity"
  href="{% if profile.role == 'Admin' %}{% url 'admin_profile' %}{% else %}{% url 'user_profile' %}{% endif %}"
  aria-label="Open profile for {{ request.user.get_full_name|default:request.user.username }}"
  title="{{ request.user.get_full_name|default:request.user.username }}"
>
  {% include 'shared/avatar.html' with avatar_profile=profile avatar_user=request.user avatar_size='header' %}
</a>
{% endwith %}
<script src="{% static 'shared/avatar.js' %}"></script>
