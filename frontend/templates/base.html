{% load static %}
<!doctype html>
<html>
  <head>
    <title>{{ PROJECT_SHORT_NAME }}</title>
    <link rel="icon" href="{% static 'images/favicon.png' %}" />
    <link rel="stylesheet" href="{% static 'shared/ui_system.css' %}" />

    <!-- ===================================================== -->
    <!-- 🔹 GLOBAL STYLING -->
    <!-- ===================================================== -->
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #f5f6fa;
        --color-brand: {{ GLOBAL_THEME.global_theme_color|default:'#0b1b68' }};
        --color-header: var(--color-brand);
        --color-button-primary: var(--color-brand);
        --color-table-head: var(--color-brand);
        --color-text-light: #fff;
      }

      /* 🔹 NAVBAR */
      .navbar {
        background-color: var(--color-header);
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
      }

      .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
      }

      /* 🔹 MAIN CONTAINER */
      .container {
        padding: 20px;
      }

      /* 🔹 CARD DESIGN */
      .card {
        background: white;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
      }

      /* 🔹 BUTTON */
      .btn {
        padding: 8px 15px;
        background-color: var(--color-button-primary);
        color: white;
        border: none;
        border-radius: 5px;
      }

      .btn:hover {
        background-color: #219150;
      }

      /* 🔹 TABLE */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }

      th {
        background-color: var(--color-table-head);
        color: var(--color-text-light);
      }
    </style>
  </head>

  <body>
    <!-- ===================================================== -->
    <!-- 🔹 NAVBAR -->
    <!-- ===================================================== -->
    <div class="navbar">
      <div>
        <strong>🚀 {{ PROJECT_SHORT_NAME }}</strong>
      </div>

      <div>
        <!-- 👉 Show username if logged in -->
        {% if request.user.is_authenticated %} {{ request.user.username }}
        <a href="{% url 'logout' %}">Logout</a>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </div>

    <!-- ===================================================== -->
    <!-- 🔹 PAGE CONTENT BLOCK -->
    <!-- ===================================================== -->
    <div class="container">
      {% block content %}
      <!-- 👉 Page content will come here -->
      {% endblock %}
    </div>
  </body>
</html>
